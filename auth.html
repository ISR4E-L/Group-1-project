<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CmdCraft Authentication</title>
</head>
<body style="margin:0; font-family: Arial, sans-serif; background: #f4f4f4;">

<div style="display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px;">
  <div style="background:#ffffff; padding:40px; border-radius:15px; box-shadow:0 15px 30px rgba(0,0,0,0.1); width:100%; max-width:400px;">

    <a href="index.html" style="text-decoration:none; color:#6d28d9; font-weight:bold; display:inline-block; margin-bottom:20px;">← Back</a>

    <div style="font-size:32px; font-weight:bold; color:#6d28d9; text-align:center; margin-bottom:25px;">CmdCraft</div>

    <div style="display:flex; justify-content:center; margin-bottom:25px;">
      <button id="loginTab" onclick="showLogin()" style="flex:1; padding:12px; border:none; background:#eee; cursor:pointer; border-radius:8px 0 0 8px; font-weight:bold;">Login</button>
      <button id="registerTab" onclick="showRegister()" style="flex:1; padding:12px; border:none; background:#eee; cursor:pointer; border-radius:0 8px 8px 0; font-weight:bold;">Register</button>
    </div>

    <form id="loginForm" style="display:flex; flex-direction:column; gap:15px;">
      <input type="email" placeholder="Email" required style="padding:12px; border-radius:8px; border:1px solid #ccc; font-size:16px; outline:none;">
      <input type="password" placeholder="Password" required style="padding:12px; border-radius:8px; border:1px solid #ccc; font-size:16px; outline:none;">
      <button type="button" onclick="fakeLogin()" style="background:#6d28d9; color:white; padding:12px; border:none; border-radius:8px; cursor:pointer; font-size:16px; transition:all 0.2s;" onmouseover="this.style.background='#5816b0'" onmouseout="this.style.background='#6d28d9'">Login</button>
    </form>

    <form id="registerForm" class="hidden" style="display:none; flex-direction:column; gap:15px;">
      <input type="text" placeholder="Name" required style="padding:12px; border-radius:8px; border:1px solid #ccc; font-size:16px; outline:none;">
      <input type="email" placeholder="Email" required style="padding:12px; border-radius:8px; border:1px solid #ccc; font-size:16px; outline:none;">
      <input type="password" placeholder="Password" required style="padding:12px; border-radius:8px; border:1px solid #ccc; font-size:16px; outline:none;">
      <button type="submit" style="background:#6d28d9; color:white; padding:12px; border:none; border-radius:8px; cursor:pointer; font-size:16px; transition:all 0.2s;" onmouseover="this.style.background='#5816b0'" onmouseout="this.style.background='#6d28d9'">Register</button>
    </form>

  </div>
</div>

<script>
function showLogin(){
  document.getElementById("loginForm").style.display = "flex";
  document.getElementById("registerForm").style.display = "none";
  document.getElementById("loginTab").style.background = "#6d28d9";
  document.getElementById("loginTab").style.color = "white";
  document.getElementById("registerTab").style.background = "#eee";
  document.getElementById("registerTab").style.color = "black";
}

function showRegister(){
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("registerForm").style.display = "flex";
  document.getElementById("registerTab").style.background = "#6d28d9";
  document.getElementById("registerTab").style.color = "white";
  document.getElementById("loginTab").style.background = "#eee";
  document.getElementById("loginTab").style.color = "black";
}

function fakeLogin(){
  setTimeout(function(){ window.location.href = "dashboard.html"; }, 500);
}

showLogin();
</script>

</body>
</html>
